# Netlify Configuration - Máxima Segurança

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20.11.0"
  VITE_APP_ENV = "production"
  VITE_ENABLE_LOGGING = "false"

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

# Headers de Segurança
[[headers]]
  for = "/*"
  
  [headers.values]
    # Força HTTPS em todas as conexões
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    
    # Content Security Policy - Máxima proteção contra XSS
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.seu-dominio.com.br; media-src 'self' https:; object-src 'none'; frame-src https://www.youtube.com; base-uri 'self'; form-action 'self'"
    
    # Previne clique em iframes (clickjacking)
    X-Frame-Options = "SAMEORIGIN"
    
    # Controla informações de referência
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Desativa MIME type sniffing
    X-Content-Type-Options = "nosniff"
    
    # Ativa proteção XSS no navegador
    X-XSS-Protection = "1; mode=block"
    
    # Previne cache de dados sensíveis
    Cache-Control = "public, max-age=3600"
    
    # Impede acesso de plugins
    X-Permitted-Cross-Domain-Policies = "none"
    
    # Permissões do navegador
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"

# Proteção de assets estáticos
[[headers]]
  for = "/assets/*"
  
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    X-Content-Type-Options = "nosniff"

# Proteção de HTML
[[headers]]
  for = "/*.html"
  
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Rate limiting (via Netlify Functions se necessário)
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Timeout de requisições
[dev]
  framework = "vite"
  targetPort = 5173
